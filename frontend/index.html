<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>replay-to-repair — triage dashboard</title>
  <!-- Tailwind Play CDN + Alpine.js: no build step. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="h-full text-slate-800">
  <div
    x-data="dashboard()"
    x-init="init()"
    class="mx-auto max-w-3xl px-6 py-12"
  >
    <header class="mb-8 flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight">replay-to-repair</h1>
        <p class="mt-1 text-sm text-slate-500">
          AI issue-triage dashboard — event-history replay demo
        </p>
      </div>
      <button
        @click="generate()"
        :disabled="generating"
        class="shrink-0 rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white
               shadow-sm transition hover:bg-slate-700 disabled:opacity-50"
      >
        <span x-text="generating ? 'Generating…' : 'Generate an issue'"></span>
      </button>
    </header>

    <!-- Subtle hint shown only when the API cannot be reached. -->
    <p
      x-show="!reachable"
      x-cloak
      class="mb-6 rounded-md border border-amber-200 bg-amber-50 px-3 py-2 text-xs text-amber-700"
    >
      Backend unreachable — retrying…
    </p>

    <!-- Owners summary, fully derived from the workflows returned by the API. -->
    <section x-show="owners().length > 0" x-cloak class="mb-8">
      <h2 class="mb-2 text-xs font-medium uppercase tracking-wide text-slate-400">
        Owners
      </h2>
      <div class="flex flex-wrap gap-2">
        <template x-for="owner in owners()" :key="owner.name">
          <span
            class="inline-flex items-center gap-1.5 rounded-full border border-slate-200
                   bg-white px-3 py-1 text-sm shadow-sm"
          >
            <span class="font-medium" x-text="owner.name"></span>
            <span
              class="rounded-full bg-slate-100 px-1.5 text-xs text-slate-500"
              x-text="owner.count"
            ></span>
          </span>
        </template>
      </div>
    </section>

    <!-- Empty state. -->
    <div
      x-show="issues.length === 0"
      x-cloak
      class="rounded-lg border border-dashed border-slate-300 bg-white/50 p-10 text-center
             text-sm text-slate-400"
    >
      No issues yet — click “Generate an issue” to start a triage.
    </div>

    <!-- One card per workflow, sorted most-recent first. -->
    <div class="space-y-4">
      <template x-for="issue in issues" :key="issue.workflowId">
        <article class="rounded-lg border border-slate-200 bg-white p-5 shadow-sm">
          <div class="flex items-start justify-between gap-4">
            <h3 class="font-medium leading-snug" x-text="issue.issueTitle"></h3>
            <template x-if="issue.assignedOwner">
              <span
                class="shrink-0 rounded-full bg-emerald-50 px-2.5 py-1 text-xs font-medium
                       text-emerald-700"
              >
                <span x-text="issue.assignedOwner"></span>
              </span>
            </template>
            <template x-if="!issue.assignedOwner">
              <span class="shrink-0 text-xs text-slate-400">triaging…</span>
            </template>
          </div>

          <!-- 5-step progress indicator matching the Step enum. -->
          <div class="mt-4 flex gap-1.5">
            <template x-for="step in steps" :key="step">
              <div class="flex-1">
                <div class="h-1.5 rounded-full" :class="segmentClass(issue, step)"></div>
                <p
                  class="mt-1.5 text-[10px] leading-tight"
                  :class="labelClass(issue, step)"
                  x-text="stepLabels[step]"
                ></p>
              </div>
            </template>
          </div>
        </article>
      </template>
    </div>
  </div>

  <script>
    function dashboard() {
      // Order matches the backend TriageStatus.Step enum exactly.
      const STEPS = [
        "ISSUE_RECEIVED",
        "AI_ANALYSIS",
        "OWNER_SELECTED",
        "NOTIFYING",
        "DONE",
      ];
      const STEP_LABELS = {
        ISSUE_RECEIVED: "Received",
        AI_ANALYSIS: "AI analysis",
        OWNER_SELECTED: "Selected",
        NOTIFYING: "Notifying",
        DONE: "Done",
      };

      return {
        issues: [],
        reachable: true,
        generating: false,
        steps: STEPS,
        stepLabels: STEP_LABELS,

        init() {
          this.refresh();
          setInterval(() => this.refresh(), 1000);
        },

        async refresh() {
          try {
            const res = await fetch("/api/v1/issues");
            if (!res.ok) {
              throw new Error("unexpected status " + res.status);
            }
            const data = await res.json();
            // Most recent first; entries with no timestamp sink to the bottom.
            this.issues = data.sort((a, b) => this.receivedTime(b) - this.receivedTime(a));
            this.reachable = true;
          } catch (e) {
            this.reachable = false;
          }
        },

        async generate() {
          this.generating = true;
          try {
            const res = await fetch("/api/v1/issues/generate", { method: "POST" });
            if (!res.ok) {
              throw new Error("unexpected status " + res.status);
            }
            this.reachable = true;
            await this.refresh();
          } catch (e) {
            this.reachable = false;
          } finally {
            this.generating = false;
          }
        },

        receivedTime(issue) {
          return issue.receivedAt ? Date.parse(issue.receivedAt) : 0;
        },

        stepIndex(step) {
          return this.steps.indexOf(step);
        },

        // A step is completed once the workflow moves past it (or reaches DONE), active while it
        // is the current step, and pending otherwise.
        segmentClass(issue, step) {
          const current = this.stepIndex(issue.currentStep);
          const index = this.stepIndex(step);
          if (issue.currentStep === "DONE" || index < current) {
            return "bg-emerald-500";
          }
          if (index === current) {
            return "bg-blue-500 animate-pulse";
          }
          return "bg-slate-200";
        },

        labelClass(issue, step) {
          const current = this.stepIndex(issue.currentStep);
          const index = this.stepIndex(step);
          if (issue.currentStep === "DONE" || index < current) {
            return "text-emerald-600";
          }
          if (index === current) {
            return "font-medium text-blue-600";
          }
          return "text-slate-400";
        },

        // Union of non-null owners seen across all workflows, with per-owner assignment counts.
        // Nothing is hardcoded: the list grows purely from the API responses.
        owners() {
          const counts = {};
          for (const issue of this.issues) {
            if (issue.assignedOwner) {
              counts[issue.assignedOwner] = (counts[issue.assignedOwner] || 0) + 1;
            }
          }
          return Object.entries(counts)
            .map(([name, count]) => ({ name, count }))
            .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));
        },
      };
    }
  </script>

  <style>
    [x-cloak] { display: none !important; }
  </style>
</body>
</html>
