<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>replay-to-repair — triage dashboard</title>
  <!-- Tailwind Play CDN + Alpine.js: no build step. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = { theme: { extend: {
      fontFamily: { display: ['Space Grotesk', 'sans-serif'], mono: ['IBM Plex Mono', 'monospace'] },
      colors: { violet: '#8B5CF6', lime: '#B6F35A', slateb: '#7C8FB1' },
    }}};
  </script>
  <style>
    body {
      background:
        radial-gradient(1200px 500px at 70% -10%, #3B2E8F55, transparent 60%),
        radial-gradient(900px 600px at 10% 0%, #201457, transparent 55%),
        #0C0A1B;
    }
    .stars { position: fixed; inset: 0; pointer-events: none;
      background-image: radial-gradient(1px 1px at 20% 30%, #fff6, transparent), radial-gradient(1px 1px at 70% 20%, #fff5, transparent), radial-gradient(1px 1px at 40% 70%, #fff4, transparent), radial-gradient(1px 1px at 85% 60%, #fff5, transparent), radial-gradient(1px 1px at 55% 45%, #fff3, transparent); }
    .grid { position: fixed; inset: 0; pointer-events: none;
      background-image: linear-gradient(#ffffff0a 1px, transparent 1px), linear-gradient(90deg, #ffffff0a 1px, transparent 1px);
      background-size: 64px 64px; -webkit-mask-image: linear-gradient(180deg, #000, transparent 55%); mask-image: linear-gradient(180deg, #000, transparent 55%); }
    .grad { background-image: linear-gradient(100deg, #8B5CF6, #5B7CFA); }
    /* Icons live on disk (icons/*.svg) and are tinted via currentColor through a CSS mask. */
    .icon { display: inline-block; background-color: currentColor;
      -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-position: center; mask-position: center; -webkit-mask-size: contain; mask-size: contain; }
    .icon-bug { -webkit-mask-image: url("icons/bug.svg"); mask-image: url("icons/bug.svg"); }
    .icon-user { -webkit-mask-image: url("icons/user.svg"); mask-image: url("icons/user.svg"); }
    /* Continuously sweeping gradient across the title text. First and last
       stops match so the loop is seamless. */
    .title-gradient {
      background-image: linear-gradient(90deg, #8B5CF6, #5B7CFA, #B6F35A, #5B7CFA, #8B5CF6);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: title-shift 6s linear infinite;
    }
    @keyframes title-shift { to { background-position: -200% center; } }
    @media (prefers-reduced-motion: reduce) { .title-gradient { animation: none; } }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="h-full font-display text-neutral-200 antialiased">
  <div class="stars"></div><div class="grid"></div>
  <div x-data="dashboard()" class="relative mx-auto max-w-3xl px-6 py-20">
    <header class="mb-8 flex items-end justify-between gap-4">
      <div>
        <p class="mb-3 font-mono text-[11px] uppercase tracking-[0.25em] text-slateb">Event-history replay · Powered by Temporal</p>
        <h1 class="title-gradient text-4xl font-semibold leading-none tracking-tight">replay → repair</h1>
      </div>
      <button
        @click="generate()"
        :disabled="generating"
        class="grad shrink-0 px-5 py-2.5 font-mono text-sm font-medium text-white shadow-[0_0_30px_-6px_#8B5CF6] transition disabled:opacity-50"
      >
        <span x-text="generating ? 'Generating…' : 'Generate an issue'"></span>
      </button>
    </header>

    <!-- Subtle hint shown only when the API cannot be reached. -->
    <p
      x-show="!reachable"
      x-cloak
      class="mb-6 rounded-md border border-amber-400/30 bg-amber-400/10 px-3 py-2 font-mono text-xs text-amber-300"
    >
      Backend unreachable — retrying…
    </p>

    <!-- Owners summary, fully derived from the workflows returned by the API. -->
    <section x-show="owners().length > 0" x-cloak class="mb-14">
      <h2 class="mb-4 font-mono text-[11px] uppercase tracking-[0.2em] text-neutral-500">Owners</h2>
      <div class="flex flex-wrap gap-2.5">
        <template x-for="owner in owners()" :key="owner.name">
          <span class="inline-flex items-center gap-2 rounded-full border border-slateb/25 bg-white/5 px-3 py-1 font-mono text-sm backdrop-blur">
            <span class="icon icon-user h-3.5 w-3.5 text-slateb"></span>
            <span class="text-neutral-100" x-text="owner.name"></span>
            <span class="text-xs text-lime" x-text="owner.count"></span>
          </span>
        </template>
      </div>
    </section>

    <!-- Empty state. -->
    <div
      x-show="issues.length === 0"
      x-cloak
      class="rounded-xl border border-dashed border-white/15 bg-white/[0.02] p-10 text-center text-sm text-neutral-500"
    >
      No issues yet — click “Generate an issue” to start a triage.
    </div>

    <!-- One card per workflow, sorted most-recent first. -->
    <div class="space-y-6">
      <template x-for="issue in issues" :key="issue.workflowId">
        <article class="rounded-xl border border-white/10 bg-white/[0.04] p-6 backdrop-blur transition hover:border-violet/40">
          <div class="flex items-start justify-between gap-4">
            <h3 class="min-w-0 pr-2 font-medium leading-snug text-white"><span class="mr-2.5 inline-flex h-6 w-6 shrink-0 -translate-y-px items-center justify-center rounded-md border border-amber-400/25 bg-amber-400/10 text-amber-300 align-middle"><span class="icon icon-bug h-4 w-4"></span></span><span x-text="issue.issueTitle"></span></h3>
            <template x-if="issue.assignedOwner">
              <span class="inline-flex shrink-0 items-center gap-1.5 rounded-full border border-lime/30 bg-lime/10 px-2.5 py-1 font-mono text-xs text-lime">
                <span class="icon icon-user h-3.5 w-3.5"></span>
                <span x-text="issue.assignedOwner"></span>
              </span>
            </template>
            <template x-if="!issue.assignedOwner && issue.currentStep === 'FAILED'">
              <span class="inline-flex shrink-0 items-center rounded-full border border-red-500/40 bg-red-500/10 px-2.5 py-1 font-mono text-xs text-red-400">
                Failed
              </span>
            </template>
            <template x-if="!issue.assignedOwner && issue.currentStep !== 'FAILED'">
              <span class="shrink-0 font-mono text-xs text-slateb">triaging…</span>
            </template>
          </div>

          <!-- 5-step progress indicator matching the Step enum. -->
          <div class="mt-6 flex gap-2">
            <template x-for="step in steps" :key="step">
              <div class="flex-1">
                <div class="h-3 rounded-full" :class="segmentClass(issue, step)"></div>
                <p
                  class="mt-2.5 font-mono text-[10px] leading-tight"
                  :class="labelClass(issue, step)"
                  x-text="stepLabels[step]"
                ></p>
              </div>
            </template>
          </div>
        </article>
      </template>
    </div>
  </div>

  <script>
    function dashboard() {
      // Order matches the backend TriageStatus.Step enum exactly.
      const STEPS = [
        "ISSUE_RECEIVED",
        "AI_ANALYSIS",
        "OWNER_SELECTED",
        "NOTIFYING",
        "DONE",
      ];
      const STEP_LABELS = {
        ISSUE_RECEIVED: "Received",
        AI_ANALYSIS: "AI analysis",
        OWNER_SELECTED: "Owner assigned",
        NOTIFYING: "Notifying",
        DONE: "Done",
        // FAILED is a terminal branch, not a happy-path step, so it stays out
        // of STEPS; it only needs a label for the badge.
        FAILED: "Failed",
      };

      return {
        issues: [],
        reachable: true,
        generating: false,
        steps: STEPS,
        stepLabels: STEP_LABELS,

        init() {
          this.refresh();
          setInterval(() => this.refresh(), 1000);
        },

        async refresh() {
          try {
            const res = await fetch("/api/v1/issues");
            if (!res.ok) {
              throw new Error("unexpected status " + res.status);
            }
            const data = await res.json();
            // Most recent first; entries with no timestamp sink to the bottom.
            this.issues = data.sort((a, b) => this.receivedTime(b) - this.receivedTime(a));
            this.reachable = true;
          } catch (e) {
            this.reachable = false;
          }
        },

        async generate() {
          this.generating = true;
          try {
            const res = await fetch("/api/v1/issues/generate", { method: "POST" });
            if (!res.ok) {
              throw new Error("unexpected status " + res.status);
            }
            this.reachable = true;
            await this.refresh();
          } catch (e) {
            this.reachable = false;
          } finally {
            this.generating = false;
          }
        },

        receivedTime(issue) {
          return issue.receivedAt ? Date.parse(issue.receivedAt) : 0;
        },

        stepIndex(step) {
          return this.steps.indexOf(step);
        },

        // A step is completed once the workflow moves past it (or reaches DONE), active while it
        // is the current step, and pending otherwise. A failed triage paints every segment red.
        segmentClass(issue, step) {
          if (issue.currentStep === "FAILED") {
            return "bg-red-500/70";
          }
          const current = this.stepIndex(issue.currentStep);
          const index = this.stepIndex(step);
          if (issue.currentStep === "DONE" || index < current) {
            return "bg-lime";
          }
          if (index === current) {
            return "bg-violet animate-pulse";
          }
          return "bg-white/10";
        },

        labelClass(issue, step) {
          if (issue.currentStep === "FAILED") {
            return "text-red-400";
          }
          const current = this.stepIndex(issue.currentStep);
          const index = this.stepIndex(step);
          if (issue.currentStep === "DONE" || index < current) {
            return "text-lime/80";
          }
          if (index === current) {
            return "font-medium text-violet";
          }
          return "text-neutral-600";
        },

        // Union of non-null owners seen across all workflows, with per-owner assignment counts.
        // Nothing is hardcoded: the list grows purely from the API responses.
        owners() {
          const counts = {};
          for (const issue of this.issues) {
            if (issue.assignedOwner) {
              counts[issue.assignedOwner] = (counts[issue.assignedOwner] || 0) + 1;
            }
          }
          return Object.entries(counts)
            .map(([name, count]) => ({ name, count }))
            .sort((a, b) => a.name.localeCompare(b.name));
        },
      };
    }
  </script>
</body>
</html>
