# Orchestrates the containerized parts of the demo: Temporal dev server, the
# backend REST API, and the Caddy gateway. The worker is deliberately NOT here
# — it runs locally (`make dev`) so it can be rebuilt and restarted quickly
# during the live demo.
services:
  # Temporal dev server — local development ONLY, never production.
  # Single process with a built-in database and Web UI (http://localhost:8233).
  temporal:
    image: temporalio/temporal:latest
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
    ports:
      - "7233:7233"  # gRPC endpoint for workers and clients
      - "8233:8233"  # Web UI — http://localhost:8233
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health"]
      interval: 10s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  # REST API consumed by the frontend. Reachable only through the gateway.
  backend:
    build: ./backend
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      PORT: "8080"
    depends_on:
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    restart: on-failure

  # Caddy: serves the static frontend and reverse-proxies /api/* to the backend.
  # BACKEND_UPSTREAM lets `make dev` point the gateway at a locally-run backend
  # instead of the backend container.
  # The gateway is the ONLY container that must reach back to the host — the
  # locally-run backend in `make dev`. Docker maps host.docker.internal via the
  # host-gateway entry (required on Docker Engine/Linux, harmless on Docker
  # Desktop). Podman provides host.containers.internal natively, so on Podman
  # the Makefile overrides GATEWAY_HOST_MAPPING with a harmless placeholder to
  # avoid Podman rootless's host-gateway resolution error. With no env set the
  # default is the Docker behavior, so `docker compose ...` works directly.
  # No hard depends_on: the gateway starts even when the backend is absent
  # (dev) or not yet ready — Caddy simply returns 502 until the upstream is up.
  gateway:
    image: caddy:2-alpine
    ports:
      - "8080:80"  # single entry point — http://localhost:8080
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend:/srv:ro
    extra_hosts:
      - "${GATEWAY_HOST_MAPPING:-host.docker.internal:host-gateway}"
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-backend:8080}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3
    restart: unless-stopped
